name: CI and Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Release Check (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  deploy:
    name: Deploy to Cloudflare Pages
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Deploy
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || 'REDACTED_CLOUDFLARE_ACCOUNT_ID' }}
          command: pages deploy dist --project-name=pokedex --branch=master
      - name: Skip deploy (no token)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "Deploy skipped - set CLOUDFLARE_API_TOKEN secret to enable"
